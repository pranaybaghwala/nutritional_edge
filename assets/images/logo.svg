<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 370">
  <defs>
    <clipPath id="leafClip">
      <path d="M207,22 C222,8 248,12 243,38 C238,62 214,68 200,54 Z"/>
    </clipPath>
  </defs>

  <!-- Circle -->
  <circle cx="148" cy="118" r="88" fill="none" stroke="#1f1f1f" stroke-width="2.8"/>

  <!-- Stem line: center → leaf base -->
  <line x1="148" y1="118" x2="213" y2="53" stroke="#1f1f1f" stroke-width="2.2"/>

  <!-- Leaf body -->
  <path d="M207,22 C222,8 248,12 243,38 C238,62 214,68 200,54 Z"
        fill="#6aab6a" stroke="#2d6b2d" stroke-width="1.8"/>

  <!-- Leaf grid lines (clipped inside leaf) -->
  <g clip-path="url(#leafClip)" stroke="white" stroke-width="1.4">
    <!-- Main vein along diagonal -->
    <line x1="200" y1="25" x2="244" y2="62"/>
    <!-- Cross veins perpendicular to main -->
    <line x1="195" y1="48" x2="232" y2="16"/>
    <line x1="208" y1="60" x2="246" y2="28"/>
    <!-- Extra cross lines -->
    <line x1="200" y1="36" x2="238" y2="10"/>
    <line x1="203" y1="54" x2="248" y2="42"/>
  </g>

  <!-- Leaf outline redraw on top for clean edge -->
  <path d="M207,22 C222,8 248,12 243,38 C238,62 214,68 200,54 Z"
        fill="none" stroke="#2d6b2d" stroke-width="1.8"/>

  <!-- Centre dot -->
  <circle cx="148" cy="118" r="5.5" fill="#1f1f1f"/>

  <!-- "The Nutritional" — italic serif -->
  <text x="150" y="238"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="33"
        fill="#222222"
        letter-spacing="-0.3">The Nutritional</text>

  <!-- "EDGE" — bold, green -->
  <text x="150" y="302"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="76"
        font-weight="bold"
        fill="#6aab6a"
        letter-spacing="4">EDGE</text>

  <!-- "BY SHIVIKA GANDHI" -->
  <text x="150" y="335"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="11.5"
        font-weight="400"
        fill="#333333"
        letter-spacing="3.8">BY SHIVIKA GANDHI</text>
</svg>
